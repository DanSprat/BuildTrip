name: build_trip
description: Trip planning app built with Flutter.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2
  file_picker: ^10.3.3
  open_file: ^3.5.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  image_path: assets/images/app_icon.png
  android: true
  ios: true

flutter_native_splash:
  color: "#F4F6FB"
  image: assets/images/app_icon.png
  android: true
  ios: true
  android_12:
    color: "#F4F6FB"
    image: assets/images/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_icon.png
